<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault.10 | Cloud Secure</title>
    <style>
        :root {
            --bg: #050505; --card: #111111; --accent: #3b82f6;
            --text: #ffffff; --text-dim: #94a3b8; --border: #222;
            --danger: #ef4444; --success: #22c55e; --transition: all 0.3s ease;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; }
        
        /* Auth Gate */
        #gate { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; text-align: center; }
        .lock-box { padding: 15px; width: 280px; border: 1px solid var(--border); border-radius: 12px; background: #000; color: white; margin-bottom: 20px; outline: none; transition: var(--transition); }
        .lock-box:focus { border-color: var(--accent); }

        /* Header */
        header { padding: 15px 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(5,5,5,0.8); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 1000; }
        .brand { font-size: 1.4rem; font-weight: 900; letter-spacing: -1px; cursor: default; }
        .brand span { color: var(--accent); }

        /* Notifications Section */
        #notif-container { position: fixed; bottom: 100px; right: 20px; z-index: 11000; display: flex; flex-direction: column; gap: 10px; }
        .toast { padding: 12px 20px; border-radius: 10px; background: var(--card); border: 1px solid var(--border); color: white; font-size: 13px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); animation: slideIn 0.3s ease forwards; min-width: 200px; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .toast.error { border-left: 4px solid var(--danger); }
        .toast.success { border-left: 4px solid var(--success); }
        .toast.info { border-left: 4px solid var(--accent); }

        /* Main UI */
        .controls { max-width: 900px; margin: 20px auto; padding: 0 20px; }
        nav { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: none; }
        .sub-pill { padding: 10px 22px; border-radius: 12px; border: 1px solid var(--border); background: var(--card); color: var(--text-dim); cursor: pointer; transition: var(--transition); white-space: nowrap; }
        .sub-pill.active { background: var(--accent); color: white; border-color: var(--accent); }
        #search-bar { width: 100%; padding: 16px; background: var(--card); border: 1px solid var(--border); border-radius: 14px; color: white; margin-bottom: 20px; box-sizing: border-box; outline:none; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: auto; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 20px; transition: var(--transition); position: relative; }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }

        /* Modals */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9000; align-items: center; justify-content: center; backdrop-filter: blur(8px); flex-direction: column; }
        .modal-ui { background: var(--card); padding: 30px; border-radius: 24px; width: 340px; border: 1px solid var(--border); }
        .modal-ui input, .modal-ui select { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid var(--border); color: white; border-radius: 10px; box-sizing: border-box; outline: none; }

        .gallery-wrap { display: flex; gap: 20px; overflow-x: auto; width: 95%; padding: 20px; scroll-snap-type: x mandatory; }
        .preview-img-box { flex: 0 0 auto; text-align: center; width: 300px; scroll-snap-align: center; }
        .preview-img { width: 100%; border-radius: 12px; border: 1px solid var(--border); max-height: 450px; object-fit: contain; background: #000; }

        /* Buttons */
        .btn { padding: 10px 18px; border-radius: 10px; border: 0; cursor: pointer; font-weight: 600; font-size: 12px; transition: var(--transition); }
        .btn-blue { background: var(--accent); color: white; }
        .btn-blue:hover { opacity: 0.8; }
        .btn-red { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid var(--danger); }
        .btn-red:hover { background: var(--danger); color: white; }
        
        .fab { position: fixed; width: 60px; height: 60px; border-radius: 20px; color: white; font-size: 28px; cursor: pointer; z-index: 2000; display: flex; align-items: center; justify-content: center; border: 0; background: var(--accent); bottom: 30px; right: 30px; box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3); transition: var(--transition); }
        .fab:hover { transform: scale(1.1) rotate(90deg); }
    </style>
</head>
<body>

<div id="notif-container"></div>

<div id="gate">
    <div class="brand" style="font-size: 3.5rem; margin-bottom: 10px;">VAULT<span>.10</span></div>
    <p style="color: var(--text-dim); margin-bottom: 30px;">Class 9 Study Group Cloud</p>
    <input type="password" id="pass" class="lock-box" placeholder="Access Key">
    <button onclick="login()" class="btn-blue" style="width:280px; padding:16px; font-size: 14px;">Authenticate</button>
</div>

<header>
    <div class="brand">VAULT<span>.10</span></div>
    <div style="text-align: right;">
        <span id="u-name" style="font-weight:bold; display:block; font-size: 14px;">User</span>
        <span onclick="logout()" style="color:var(--text-dim); font-size:11px; cursor:pointer;">Sign Out</span>
    </div>
</header>

<div class="controls">
    <input type="text" id="search-bar" placeholder="Search chapters (e.g. Motion, Atoms)..." oninput="render()">
    <nav>
        <button class="sub-pill active" onclick="setSub('All', this)">All</button>
        <button class="sub-pill" onclick="setSub('Maths', this)">Maths</button>
        <button class="sub-pill" onclick="setSub('Science', this)">Science</button>
        <button class="sub-pill" onclick="setSub('SST', this)">SST</button>
        <button class="sub-pill" onclick="setSub('Hindi', this)">Hindi</button>
        <button class="sub-pill" onclick="setSub('English', this)">English</button>
    </nav>
</div>

<div id="main-grid" class="grid"></div>

<div id="up-modal" class="modal">
    <div class="modal-ui">
        <h3 style="margin-top: 0;">Upload to Cloud</h3>
        <label style="font-size: 11px; color: var(--text-dim);">SELECT SUBJECT</label>
        <select id="f-sub">
            <option>Maths</option><option>Science</option><option>SST</option>
            <option>Hindi</option><option>English</option>
        </select>
        <label style="font-size: 11px; color: var(--text-dim);">CHAPTER NAME</label>
        <input type="text" id="f-chap" placeholder="Ex: Sound Physics">
        <input type="file" id="f-files" multiple accept="image/*">
        <button onclick="pushNotes()" id="up-btn" class="btn-blue" style="width:100%; margin-top:15px;">Push to GitHub</button>
        <button onclick="closeModal('up-modal')" style="width:100%; background:none; border:0; color:var(--text-dim); margin-top:10px; cursor:pointer; font-size: 12px;">Cancel</button>
    </div>
</div>

<div id="pre-modal" class="modal">
    <div style="width:90%; display:flex; justify-content:space-between; align-items:center;">
        <h3 id="pre-title" style="margin: 0;">Preview</h3>
        <button onclick="closeModal('pre-modal')" style="background:none; border:0; color:white; font-size:35px; cursor:pointer;">&times;</button>
    </div>
    <div id="gallery" class="gallery-wrap"></div>
</div>

<button class="fab" onclick="openModal('up-modal')">+</button>

<script>
    // --- FINAL GITHUB CONFIGURATION ---
    const G_USER = 'siddharthsinghpryg2011'; 
    const G_REPO = 'siddharthsinghpryg2011.github.io'; 
    // ----------------------------------

    const authKeys = { "U2lkIzl4WjI=": "Siddharth", "VGVqKjRrTDc=": "Tejeshwar", "QWp5JjFtUDU=": "Ajay", "SXNoKzdRdzE=": "Ishmeet" };
    let db = JSON.parse(localStorage.getItem("v_db")) || [];
    let activeSub = "All";

    // Notification System
    function notify(msg, type = 'info') {
        const container = document.getElementById('notif-container');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerText = msg;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 4000);
    }

    function login() {
        const p = document.getElementById('pass').value.trim();
        if(authKeys[btoa(p)]) { 
            localStorage.setItem("v_user", authKeys[btoa(p)]); 
            notify("Access Granted!", "success");
            setTimeout(() => location.reload(), 500);
        } else {
            notify("Invalid Access Key!", "error");
        }
    }

    function logout() { 
        localStorage.removeItem("v_user"); 
        location.reload(); 
    }

    window.onload = () => {
        const user = localStorage.getItem("v_user");
        if(user) { 
            document.getElementById('gate').style.display = 'none'; 
            document.getElementById('u-name').innerText = user; 
            render(); 
        }
    };

    function setSub(s, btn) {
        activeSub = s;
        document.querySelectorAll('.sub-pill').forEach(x => x.classList.remove('active'));
        btn.classList.add('active');
        render();
    }

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    async function pushNotes() {
        // Token Security Check
        let token = localStorage.getItem("gh_token");
        if(!token) {
            token = prompt("GitHub Token needed for first upload.\nGo to GitHub Settings > Developer > Personal Access Token > Generate Classic (check 'repo' box).");
            if(!token) return notify("Token Required!", "error");
            localStorage.setItem("gh_token", token);
        }

        const sub = document.getElementById('f-sub').value;
        const chap = document.getElementById('f-chap').value.trim();
        const fileInput = document.getElementById('f-files');
        const user = localStorage.getItem("v_user");

        if(!chap || fileInput.files.length === 0) return notify("Chapters & Files missing!", "error");

        const btn = document.getElementById('up-btn');
        btn.innerText = "Processing Cloud...";
        btn.disabled = true;

        try {
            const uploadedUrls = [];
            notify(`Starting upload of ${fileInput.files.length} files...`, "info");

            for (let i = 0; i < fileInput.files.length; i++) {
                const file = fileInput.files[i];
                const fileName = `note_${Date.now()}_${i}.jpg`;
                const base64Content = await toBase64(file);
                const cleanBase64 = base64Content.split(',')[1];

                const response = await fetch(`https://api.github.com/repos/${G_USER}/${G_REPO}/contents/notes/${fileName}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: `Upload ${chap}`, content: cleanBase64 })
                });

                if(response.ok) {
                    const data = await response.json();
                    uploadedUrls.push(data.content.download_url);
                } else {
                    if(response.status === 401) {
                        localStorage.removeItem("gh_token");
                        throw new Error("Token Expired. Refresh & try again.");
                    }
                    const errData = await response.json();
                    throw new Error(errData.message);
                }
            }

            db.unshift({ id: Date.now(), subject: sub, chapter: chap, author: user, imgs: uploadedUrls });
            localStorage.setItem("v_db", JSON.stringify(db));
            notify("All files pushed to GitHub!", "success");
            closeModal('up-modal');
            render();
        } catch (e) {
            notify("Cloud Error: " + e.message, "error");
            console.error(e);
        } finally {
            btn.innerText = "Push to GitHub";
            btn.disabled = false;
        }
    }

    const toBase64 = file => new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
    });

    function render() {
        const grid = document.getElementById('main-grid');
        const q = document.getElementById('search-bar').value.toLowerCase();
        const user = localStorage.getItem("v_user");
        grid.innerHTML = "";

        const filtered = db.filter(i => (activeSub === "All" || i.subject === activeSub) && i.chapter.toLowerCase().includes(q));
        
        if(filtered.length === 0) {
            grid.innerHTML = `<p style="grid-column: 1/-1; text-align:center; color: var(--text-dim); margin-top: 50px;">No notes found in this subject.</p>`;
            return;
        }

        filtered.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div style="font-size:10px; color:var(--accent); font-weight:bold; letter-spacing: 1px;">${item.subject.toUpperCase()}</div>
                <div style="font-size:1.2rem; font-weight:bold; margin: 10px 0;">${item.chapter}</div>
                <div style="display:flex; justify-content:space-between; align-items:center; margin-top:20px;">
                    <span style="font-size:11px; color:var(--text-dim)">Uploaded by <b>${item.author}</b></span>
                    <div style="display:flex; gap:8px;">
                        ${item.author === user ? `<button class="btn btn-red" onclick="delNote(${item.id})">Delete</button>` : ''}
                        <button class="btn btn-blue" onclick="openGallery(${item.id})">View (${item.imgs.length})</button>
                    </div>
                </div>`;
            grid.appendChild(card);
        });
    }

    function openGallery(id) {
        const item = db.find(x => x.id === id);
        const gal = document.getElementById('gallery');
        document.getElementById('pre-title').innerText = item.chapter;
        gal.innerHTML = item.imgs.map(src => `
            <div class="preview-img-box">
                <img src="${src}" class="preview-img">
                <a href="${src}" target="_blank" class="btn-blue btn" style="margin-top:15px; display:block; text-align:center;">Open Full Quality</a>
            </div>
        `).join('');
        openModal('pre-modal');
    }

    function delNote(id) {
        if(confirm("This will remove the link from this site. (The image stays on GitHub)")) {
            db = db.filter(x => x.id !== id);
            localStorage.setItem("v_db", JSON.stringify(db));
            notify("Note link removed.", "info");
            render();
        }
    }
</script>
</body>
</html>
