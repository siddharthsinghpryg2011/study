<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault.10 | Private Study Cloud</title>
    <style>
        :root {
            --bg: #050505; --card: #111111; --accent: #3b82f6;
            --text: #ffffff; --text-dim: #94a3b8; --border: #222;
            --danger: #ef4444; --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; }

        /* Auth Screen */
        #gate { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; text-align: center; }
        .lock-box { padding: 15px; width: 280px; border: 1px solid var(--border); border-radius: 12px; background: #000; color: white; margin-bottom: 20px; outline: none; }

        /* Header */
        header { padding: 15px 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(5,5,5,0.8); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 1000; }
        .brand { font-size: 1.4rem; font-weight: 900; letter-spacing: -1px; cursor: pointer; }
        .brand span { color: var(--accent); }

        /* Controls */
        .controls { max-width: 900px; margin: 20px auto; padding: 0 20px; }
        nav { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: none; }
        .sub-pill { padding: 10px 22px; border-radius: 12px; border: 1px solid var(--border); background: var(--card); color: var(--text-dim); cursor: pointer; transition: var(--transition); white-space: nowrap; }
        .sub-pill.active { background: var(--accent); color: white; border-color: var(--accent); }
        
        #search-bar { width: 100%; padding: 16px; background: var(--card); border: 1px solid var(--border); border-radius: 14px; color: white; font-size: 16px; outline: none; margin-bottom: 20px; box-sizing: border-box; }

        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: auto; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 20px; transition: var(--transition); animation: fadeIn 0.5s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Modals */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9000; align-items: center; justify-content: center; backdrop-filter: blur(5px); flex-direction: column; }
        .modal-ui { background: var(--card); padding: 30px; border-radius: 20px; width: 340px; border: 1px solid var(--border); }
        .modal-ui input, .modal-ui select { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid var(--border); color: white; border-radius: 8px; box-sizing: border-box; }

        /* Activity Hub */
        #notif-overlay { position: fixed; right: -400px; top: 0; width: 320px; height: 100%; background: var(--card); border-left: 1px solid var(--border); z-index: 5000; transition: var(--transition); padding: 20px; display: flex; flex-direction: column; }
        #notif-overlay.open { right: 0; }
        .notif-msg { background: #000; padding: 12px; border-radius: 10px; margin-bottom: 10px; border-left: 3px solid var(--accent); position: relative; }

        /* FABs */
        .fab { position: fixed; width: 55px; height: 55px; border-radius: 50%; border: 0; color: white; cursor: pointer; z-index: 2000; display: flex; align-items: center; justify-content: center; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .add-fab { bottom: 30px; left: 30px; background: var(--accent); font-size: 24px; }
        .notif-fab { bottom: 100px; right: 30px; background: #222; border: 1px solid var(--border); font-size: 20px; }
        
        /* Logout Button (Bottom Right) */
        .logout-fab { bottom: 30px; right: 30px; background: var(--danger); }
        .logout-fab svg { width: 24px; height: 24px; fill: white; }

        .empty-state { text-align: center; grid-column: 1 / -1; padding: 50px; color: var(--text-dim); }
    </style>
</head>
<body>

<div id="gate">
    <div class="brand" style="font-size: 3rem;">VAULT<span>.10</span></div>
    <input type="password" id="pass" class="lock-box" placeholder="Access Key">
    <button onclick="login()" class="btn-blue" style="width:280px; padding:15px; border:0; border-radius:12px; color:white; font-weight:bold; cursor:pointer; background:var(--accent);">Authenticate</button>
</div>

<header>
    <div class="brand" onclick="sync()">VAULT<span>.10</span> <small style="font-size: 10px; opacity: 0.4; margin-left: 5px;">Refresh</small></div>
    <div style="text-align: right;">
        <span id="u-name" style="font-weight:bold; display:block;">User</span>
        <span onclick="openModal('settings-modal')" style="color:var(--accent); font-size:11px; cursor:pointer;">Cloud Config</span>
    </div>
</header>

<div class="controls">
    <input type="text" id="search-bar" placeholder="Search chapter..." oninput="render()">
    <nav>
        <button class="sub-pill active" onclick="setSub('All', this)">All</button>
        <button class="sub-pill" onclick="setSub('Maths', this)">Maths</button>
        <button class="sub-pill" onclick="setSub('Science', this)">Science</button>
        <button class="sub-pill" onclick="setSub('SST', this)">SST</button>
        <button class="sub-pill" onclick="setSub('Hindi', this)">Hindi</button>
        <button class="sub-pill" onclick="setSub('English', this)">English</button>
    </nav>
</div>

<div id="main-grid" class="grid"></div>

<div id="settings-modal" class="modal">
    <div class="modal-ui">
        <h3>Cloud Settings</h3>
        <input type="password" id="set-token" placeholder="GitHub Token">
        <input type="text" id="set-user" placeholder="Username">
        <input type="text" id="set-repo" placeholder="Repo Name">
        <button onclick="saveSettings()" style="width:100%; padding:12px; background:var(--accent); color:white; border:0; border-radius:8px; font-weight:bold;">Save & Sync</button>
        <button onclick="closeModal('settings-modal')" style="width:100%; background:none; border:0; color:var(--text-dim); margin-top:10px;">Close</button>
    </div>
</div>

<div id="up-modal" class="modal">
    <div class="modal-ui">
        <h3>Push Notes</h3>
        <select id="f-sub"><option>Maths</option><option>Science</option><option>SST</option><option>Hindi</option><option>English</option></select>
        <input type="text" id="f-chap" placeholder="Chapter Name">
        <input type="file" id="f-files" multiple accept="image/*">
        <button onclick="pushNotes()" id="up-btn" style="width:100%; padding:12px; background:var(--accent); color:white; border:0; border-radius:8px; font-weight:bold;">Upload to GitHub</button>
        <button onclick="closeModal('up-modal')" style="width:100%; background:none; border:0; color:var(--text-dim); margin-top:10px;">Cancel</button>
    </div>
</div>

<div id="pre-modal" class="modal">
    <div style="width:95%; max-width:900px; display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <h3 id="pre-title">Preview</h3>
        <button onclick="closeModal('pre-modal')" style="background:none; border:0; color:white; font-size:30px; cursor:pointer;">&times;</button>
    </div>
    <div id="gallery" style="overflow-y:auto; max-height:85vh; width:95%; max-width:900px; display:flex; flex-direction:column; gap:25px;"></div>
</div>

<div id="notif-overlay">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h3>Activity Hub</h3>
        <button onclick="toggleNotif(false)" style="background:none; border:0; color:white; font-size:25px;">&times;</button>
    </div>
    <div style="margin-bottom:15px;">
        <input type="text" id="chat-input" class="lock-box" style="width:100%; font-size:12px; box-sizing:border-box;" placeholder="Type message...">
        <button onclick="sendChat()" style="width:100%; padding:8px; background:var(--accent); border:0; border-radius:8px; color:white;">Send</button>
    </div>
    <div id="notif-list" style="overflow-y:auto; flex:1;"></div>
</div>

<button class="fab add-fab" onclick="openModal('up-modal')">+</button>
<button class="fab notif-fab" onclick="toggleNotif(true)">🔔</button>

<button class="fab logout-fab" onclick="logout()" title="Logout">
    <svg viewBox="0 0 24 24">
        <path d="M13 3h-2v10h2V3zm4.83 2.17l-1.42 1.42C17.99 7.86 19 9.81 19 12c0 3.87-3.13 7-7 7s-7-3.13-7-7c0-2.19 1.01-4.14 2.58-5.42L6.17 5.17C4.23 6.82 3 9.26 3 12c0 4.97 4.03 9 9 9s9-4.03 9-9c0-2.74-1.23-5.18-3.17-6.83z"/>
    </svg>
</button>

<script>
    const keys = { "U2lkIzl4WjI=": "Siddharth", "VGVqKjRrTDc=": "Tejeshwar", "QWp5JjFtUDU=": "Ajay" };
    let db = []; let chats = []; let activeSub = "All";

    function saveSettings() {
        localStorage.setItem("gh_token", document.getElementById('set-token').value);
        localStorage.setItem("gh_user", document.getElementById('set-user').value);
        localStorage.setItem("gh_repo", document.getElementById('set-repo').value);
        alert("Config Saved!"); sync(); closeModal('settings-modal');
    }

    async function gh(path, method = "GET", body = null) {
        const t = localStorage.getItem("gh_token"), u = localStorage.getItem("gh_user"), r = localStorage.getItem("gh_repo");
        if(!t || !u || !r) return { ok: false };
        const url = `https://api.github.com/repos/${u}/${r}/contents/${path}`;
        const headers = { "Authorization": `token ${t}`, "Accept": "application/vnd.github.v3+json", "Cache-Control": "no-cache" };
        return fetch(url, { method, headers, body: body ? JSON.stringify(body) : null });
    }

    function login() {
        const p = document.getElementById('pass').value.trim();
        if(keys[btoa(p)]) { localStorage.setItem("v_user", keys[btoa(p)]); location.reload(); }
        else alert("Invalid Key");
    }

    function logout() { localStorage.removeItem("v_user"); location.reload(); }

    window.onload = () => {
        const u = localStorage.getItem("v_user");
        if(u) { 
            document.getElementById('gate').style.display = 'none'; 
            document.getElementById('u-name').innerText = u;
            // Load saved config into inputs for easy editing
            document.getElementById('set-token').value = localStorage.getItem("gh_token") || "";
            document.getElementById('set-user').value = localStorage.getItem("gh_user") || "";
            document.getElementById('set-repo').value = localStorage.getItem("gh_repo") || "";
            sync();
        }
    };

    async function sync() {
        // Use a random query param to bust GitHub cache
        const cacheBuster = `?cb=${Date.now()}`;
        const res = await gh("data" + cacheBuster);
        
        if (res.ok) {
            const files = await res.json();
            db = [];
            // Filter only .json files in the /data folder
            const jsonFiles = files.filter(f => f.name.endsWith('.json'));
            
            for (let f of jsonFiles) {
                try {
                    const contentRes = await fetch(f.download_url + cacheBuster);
                    if (contentRes.ok) {
                        const data = await contentRes.json();
                        db.push(data);
                    }
                } catch(e) { console.error("Error loading file:", f.name); }
            }
            render();
        } else {
            document.getElementById('main-grid').innerHTML = `<div class="empty-state">No data found in /data folder or Config is wrong.</div>`;
        }

        const cRes = await gh("hub_chat.json" + cacheBuster);
        if (cRes.ok) {
            const cData = await cRes.json();
            chats = JSON.parse(atob(cData.content));
            renderChats();
        }
    }

    async function pushNotes() {
        const sub = document.getElementById('f-sub').value, chap = document.getElementById('f-chap').value.trim(), fileInput = document.getElementById('f-files');
        if(!chap || fileInput.files.length === 0) return alert("Fill all details!");
        
        const btn = document.getElementById('up-btn'); btn.innerText = "Syncing with GitHub..."; btn.disabled = true;

        try {
            const imgs = await Promise.all(Array.from(fileInput.files).map(f => new Promise(r => {
                const rd = new FileReader(); rd.onload = e => r(e.target.result); rd.readAsDataURL(f);
            })));

            const fileName = `data/${sub}_${chap.replace(/\s+/g, '_')}.json`;
            let sha = null, data = { subject: sub, chapter: chap, notes: [] };

            const check = await gh(fileName);
            if (check.ok) {
                const existing = await check.json();
                sha = existing.sha;
                data = JSON.parse(atob(existing.content));
            }

            data.notes.push({ author: localStorage.getItem("v_user"), time: new Date().toLocaleString(), pages: imgs });
            const push = await gh(fileName, "PUT", { message: `Cloud Update: ${chap}`, content: btoa(JSON.stringify(data)), sha: sha });

            if(push.ok) {
                alert("Notes Successfully Pushed! ✅");
                closeModal('up-modal'); sync();
            } else { alert("Push Failed! ❌ Check GitHub permissions."); }
        } catch(e) { alert("Error: " + e); }
        btn.innerText = "Upload to GitHub"; btn.disabled = false;
    }

    async function sendChat() {
        const input = document.getElementById('chat-input'), user = localStorage.getItem("v_user");
        if(!input.value.trim()) return;
        
        chats.unshift({ id: Date.now(), user: user, text: input.value, time: new Date().toLocaleTimeString() });
        const check = await gh("hub_chat.json");
        let sha = check.ok ? (await check.json()).sha : null;
        
        await gh("hub_chat.json", "PUT", { message: "Chat Update", content: btoa(JSON.stringify(chats.slice(0,30))), sha: sha });
        input.value = ""; sync();
    }

    async function deleteMsg(id) {
        if(!confirm("Delete your message?")) return;
        chats = chats.filter(c => c.id !== id);
        const check = await gh("hub_chat.json");
        let sha = (await check.json()).sha;
        await gh("hub_chat.json", "PUT", { message: "Delete Msg", content: btoa(JSON.stringify(chats)), sha: sha });
        sync();
    }

    function render() {
        const grid = document.getElementById('main-grid'), q = document.getElementById('search-bar').value.toLowerCase();
        grid.innerHTML = "";
        
        const filtered = db.filter(i => (activeSub === "All" || i.subject === activeSub) && i.chapter.toLowerCase().includes(q));
        
        if(filtered.length === 0) {
            grid.innerHTML = `<div class="empty-state">No notes found for "${activeSub}". Try refreshing or check /data folder.</div>`;
            return;
        }

        filtered.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div style="font-size:10px; color:var(--accent); font-weight:900; letter-spacing:1px;">${item.subject.toUpperCase()}</div>
                <div style="font-size:1.3rem; font-weight:800; margin: 12px 0;">${item.chapter}</div>
                <div style="display:flex; justify-content:space-between; align-items:center; border-top:1px solid #222; padding-top:15px;">
                    <span style="font-size:11px; color:var(--text-dim)">${item.notes.length} Contributor(s)</span>
                    <button class="btn-blue" style="border:0; padding:8px 16px; border-radius:8px; cursor:pointer; background:var(--accent); color:white; font-weight:bold;" onclick="viewVault('${item.chapter}')">Open Vault</button>
                </div>`;
            grid.appendChild(card);
        });
    }

    function renderChats() {
        const me = localStorage.getItem("v_user");
        document.getElementById('notif-list').innerHTML = chats.map(c => `
            <div class="notif-msg">
                <strong style="font-size:11px; color:var(--accent);">${c.user}</strong>
                <div style="font-size:13px; margin:4px 0;">${c.text}</div>
                <div style="font-size:9px; opacity:0.4;">${c.time}</div>
                ${c.user === me ? `<button onclick="deleteMsg(${c.id})" style="position:absolute; top:10px; right:10px; background:none; border:0; color:var(--danger); cursor:pointer;">&times;</button>` : ''}
            </div>`).join('');
    }

    function viewVault(name) {
        const item = db.find(d => d.chapter === name);
        const gal = document.getElementById('gallery');
        document.getElementById('pre-title').innerText = name;
        gal.innerHTML = item.notes.map(n => `
            <div style="padding:20px; background:#0a0a0a; border-radius:15px; border:1px solid #222;">
                <div style="color:var(--accent); font-size:12px; margin-bottom:15px; font-weight:bold;">Contributor: ${n.author} | ${n.time}</div>
                ${n.pages.map(p => `<img src="${p}" style="width:100%; border-radius:10px; margin-bottom:15px; border:1px solid #333;">`).join('')}
            </div>`).join('');
        openModal('pre-modal');
    }

    function setSub(s, b) { 
        activeSub = s; 
        document.querySelectorAll('.sub-pill').forEach(x => x.classList.remove('active')); 
        b.classList.add('active'); 
        render(); 
    }
    function toggleNotif(s) { document.getElementById('notif-overlay').classList.toggle('open', s); }
    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
</script>
</body>
</html>
