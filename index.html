<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault.10 | User Segregated Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505; 
            --card: #111111; 
            --accent: #3b82f6;
            --text: #ffffff; 
            --text-dim: #94a3b8; 
            --border: #222;
            --danger: #ef4444; 
            --success: #22c55e;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; overflow-x: hidden; }
        
        /* Login Gate Overlay */
        #gate { position: fixed; inset: 0; background: var(--bg); z-index: 20000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .gate-input { padding: 16px; width: 280px; border-radius: 12px; background: #111; border: 1px solid #333; color: white; margin-bottom: 20px; text-align: center; font-size: 16px; outline: none; transition: 0.3s; }
        .gate-input:focus { border-color: var(--accent); }
        .gate-btn { width: 280px; padding: 16px; background: var(--accent); color: white; border: 0; border-radius: 12px; font-weight: 900; cursor: pointer; transition: 0.3s; }

        /* Header & Navigation */
        header { padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(5,5,5,0.8); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 1000; }
        .brand { font-size: 1.4rem; font-weight: 900; cursor: pointer; }
        .brand span { color: var(--accent); }
        .header-right { display: flex; align-items: center; gap: 15px; }
        
        .controls { max-width: 900px; margin: 15px auto; padding: 0 15px; }
        #search-bar { width: 100%; padding: 14px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; color: white; outline: none; margin-bottom: 15px; box-sizing: border-box; }
        nav { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .sub-pill { padding: 8px 18px; border-radius: 10px; border: 1px solid var(--border); background: var(--card); color: var(--text-dim); cursor: pointer; white-space: nowrap; font-size: 13px; font-weight: 600; }
        .sub-pill.active { background: var(--accent); color: white; border-color: var(--accent); }
        
        /* Grid & Cards */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; padding: 15px; max-width: 1200px; margin: auto; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; overflow: hidden; display: flex; flex-direction: column; transition: 0.3s; }
        .card:hover { border-color: #444; }
        .card-header { padding: 15px; background: #1a1a1a; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .card-header h3 { margin: 0; font-size: 16px; font-weight: 900; text-transform: none; }
        
        .user-section { padding: 12px; border-bottom: 1px solid #222; }
        .user-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .user-name { font-size: 12px; font-weight: 800; color: var(--accent); text-transform: uppercase; }
        
        .btn-row { display: flex; gap: 8px; }
        .btn-mini { flex: 1; padding: 8px; border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; border: none; }
        .btn-view { background: #333; color: white; }
        .btn-del { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); }

        /* Floating Bottom Bar */
        .bottom-bar { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; background: rgba(20,20,20,0.9); border: 1px solid #333; padding: 10px 25px; border-radius: 40px; backdrop-filter: blur(10px); z-index: 5000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .bar-btn { width: 45px; height: 45px; border-radius: 50%; border: 0; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; transition: 0.3s; }
        .bar-btn.main { background: var(--accent); width: 55px; height: 55px; margin-top: -10px; border: 4px solid var(--bg); }
        .bar-btn.hub { background: #1a1a1a; border: 1px solid #333; }
        .bar-btn.logout { background: var(--danger); font-size: 11px; width: auto; padding: 0 18px; border-radius: 20px; }

        /* Modals */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 30000; flex-direction: column; justify-content: center; align-items: center; }
        .modal-content { background: var(--card); padding: 30px; border-radius: 24px; width: 95%; max-width: 400px; border: 1px solid var(--border); box-sizing: border-box; }
        
        /* Chat Hub Drawer */
        #hub-overlay { display: none; position: fixed; inset: 0; z-index: 35000; background: rgba(0,0,0,0.8); justify-content: flex-end; }
        .hub-drawer { width: 350px; background: #050505; height: 100%; border-left: 1px solid #222; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        #hub-list { flex: 1; overflow-y: auto; margin: 15px 0; padding-right: 5px; }
        .msg-box { background: #111; padding: 12px; border-radius: 12px; margin-bottom: 10px; border-left: 3px solid var(--accent); }
    </style>
</head>
<body>

<div id="gate">
    <h1 style="font-size:3.5rem; margin:0; letter-spacing:-3px;">VAULT<span>.10</span></h1>
    <p style="color: #444; font-size: 12px; margin: 10px 0 30px;">DATABASE AUTHENTICATION READY</p>
    <input type="password" id="pass" class="gate-input" placeholder="Enter Access Key">
    <button onclick="login()" id="login-btn" class="gate-btn">UNLOCK VAULT</button>
    <p onclick="openModal('cloud-modal')" style="margin-top:25px; color:var(--text-dim); font-size:12px; cursor:pointer; text-decoration:underline;">⚙️ GitHub Chat Config</p>
</div>

<header>
    <div class="brand" onclick="location.reload()">VAULT<span>.10</span></div>
    <div class="header-right">
        <button class="btn-mini btn-view" style="padding: 5px 12px;" onclick="addUserPrompt()">+ USER</button>
        <div id="u-display" style="font-weight:900; color:var(--accent); font-size:12px;"></div>
    </div>
</header>

<div class="controls">
    <input type="text" id="search-bar" placeholder="Search Chapter Name..." oninput="render()">
    <nav id="subject-nav">
        <button class="sub-pill active" onclick="setSub('All', this)">All</button>
        <button class="sub-pill" onclick="setSub('Maths', this)">Maths</button>
        <button class="sub-pill" onclick="setSub('Science', this)">Science</button>
        <button class="sub-pill" onclick="setSub('SST', this)">SST</button>
        <button class="sub-pill" onclick="setSub('Hindi', this)">Hindi</button>
        <button class="sub-pill" onclick="setSub('English', this)">English</button>
    </nav>
</div>

<div id="main-grid" class="grid"></div>

<div class="bottom-bar">
    <button class="bar-btn main" onclick="openModal('up-modal')">+</button>
    <button class="bar-btn hub" onclick="toggleHub(true)">🔔</button>
    <button class="bar-btn logout" onclick="logout()">LOGOUT</button>
</div>

<div id="up-modal" class="modal">
    <div class="modal-content">
        <h2 style="margin:0 0 20px;">Add New Notes</h2>
        <select id="f-sub" style="width:100%; padding:14px; background:#000; color:white; border:1px solid #333; border-radius:10px; margin-bottom:15px; outline:none;">
            <option>Maths</option><option>Science</option><option>SST</option><option>Hindi</option><option>English</option>
        </select>
        <input type="text" id="f-chap" placeholder="Chapter Title" style="width:100%; padding:14px; background:#000; color:white; border:1px solid #333; border-radius:10px; margin-bottom:15px; box-sizing:border-box; outline:none;">
        <input type="file" id="f-files" multiple accept="image/*,.pdf" style="margin-bottom:20px; font-size:12px; color:var(--text-dim);">
        <button onclick="pushNotes()" id="up-btn" style="width:100%; padding:16px; background:var(--accent); color:white; border:0; border-radius:12px; font-weight:bold; cursor:pointer;">UPLOAD TO CLOUD</button>
        <button onclick="closeModal('up-modal')" style="width:100%; background:none; border:0; color:var(--text-dim); margin-top:15px; cursor:pointer;">Cancel</button>
    </div>
</div>

<div id="cloud-modal" class="modal">
    <div class="modal-content">
        <h3>GitHub Config</h3>
        <input type="text" id="gh-token" placeholder="GitHub Token" style="width:100%; padding:12px; margin-bottom:10px; background:#000; border:1px solid #333; color:white; border-radius:8px;">
        <input type="text" id="gh-repo" placeholder="username/repository" style="width:100%; padding:12px; margin-bottom:15px; background:#000; border:1px solid #333; color:white; border-radius:8px;">
        <button onclick="saveCloudConfig()" style="width:100%; padding:12px; background:var(--success); color:white; border:0; border-radius:8px; font-weight:bold;">SAVE CONFIG</button>
        <button onclick="closeModal('cloud-modal')" style="width:100%; background:none; color:#666; border:0; margin-top:10px;">Close</button>
    </div>
</div>

<div id="hub-overlay" onclick="toggleHub(false)">
    <div class="hub-drawer" onclick="event.stopPropagation()">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 style="margin:0;">Chat Hub</h2>
            <button onclick="toggleHub(false)" style="background:none; border:0; color:white; font-size:30px;">&times;</button>
        </div>
        <div id="hub-list"></div>
        <div style="display:flex; gap:10px;">
            <input type="text" id="chat-input" placeholder="Message..." style="flex:1; padding:12px; background:#111; border:1px solid #333; color:white; border-radius:10px;">
            <button onclick="sendChat()" style="padding:0 15px; background:var(--accent); border:0; border-radius:10px; color:white;">></button>
        </div>
    </div>
</div>

<script>
    const SB_URL = "https://eqzkbvktpwzoojhsubum.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVxemtidmt0cHd6b29qaHN1YnVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4ODIxMTAsImV4cCI6MjA4OTQ1ODExMH0.9Oaw3NH3ponUEJL9mKWSgccxA8eyNaie4mfwN1E_8b8";
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
    
    let db = []; 
    let activeSub = "All";

    async function login() {
        const pass = document.getElementById('pass').value;
        const btn = document.getElementById('login-btn');
        if(!pass) return;
        btn.innerText = "VERIFYING...";
        const { data } = await supabaseClient.from('vault_access').select('username').eq('key', btoa(pass)).single();
        if (data) {
            localStorage.setItem("v_user", data.username);
            location.reload();
        } else {
            alert("Incorrect Key!");
            btn.innerText = "UNLOCK VAULT";
        }
    }

    function logout() { localStorage.removeItem("v_user"); location.reload(); }

    async function addUserPrompt() {
        const n = prompt("Username:"), k = prompt("Key:");
        if(n && k) await supabaseClient.from('vault_access').insert([{ username: n, key: btoa(k) }]);
    }

    async function sync() {
        const { data: n } = await supabaseClient.from('notes_table').select('*').order('id', {ascending: false});
        if(n) { db = n; render(); }
        const { data: m } = await supabaseClient.from('messages').select('*').order('id', {ascending: false}).limit(20);
        if(m) renderHub(m);
    }

    function render() {
        const grid = document.getElementById('main-grid'), q = document.getElementById('search-bar').value.toLowerCase(), me = localStorage.getItem("v_user");
        grid.innerHTML = ""; const chapters = {};
        db.forEach(i => {
            if((activeSub === "All" || i.subject === activeSub) && i.chapter.toLowerCase().includes(q)) {
                if(!chapters[i.chapter]) chapters[i.chapter] = { subject: i.subject, users: {} };
                if(!chapters[i.chapter].users[i.author]) chapters[i.chapter].users[i.author] = { pages: [] };
                chapters[i.chapter].users[i.author].pages.push(...i.pages);
            }
        });
        Object.entries(chapters).forEach(([chap, d]) => {
            const card = document.createElement('div'); card.className='card';
            let userHtml = "";
            Object.entries(d.users).forEach(([u, c]) => {
                userHtml += `<div class="user-section"><div class="user-info"><span class="user-name">${u}</span><span>${c.pages.length} Files</span></div><div class="btn-row"><button class="btn-mini btn-view" onclick="viewPages('${encodeURIComponent(JSON.stringify(c.pages))}')">VIEW</button>${u===me ? `<button class="btn-mini btn-del" onclick="deleteNotes('${chap}')">DELETE</button>` : ''}</div></div>`;
            });
            card.innerHTML = `<div class="card-header"><h3>${chap}</h3><small style="color:var(--accent)">${d.subject}</small></div>${userHtml}`;
            grid.appendChild(card);
        });
    }

    function viewPages(encodedData) {
        try {
            const pages = JSON.parse(decodeURIComponent(encodedData));
            if (pages && pages.length > 0) {
                const v = window.open("", "_blank");
                v.document.write(`
                <html>
                <head>
                    <title>Vault.10 Viewer</title>
                    <style>
                        body { background: #050505; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; font-family: sans-serif; }
                        .item-container { background: #111; padding: 20px; border-radius: 15px; border: 1px solid #333; margin-bottom: 30px; width: 90%; max-width: 800px; display: flex; flex-direction: column; align-items: center; }
                        img, iframe { width: 100%; border-radius: 8px; margin-bottom: 15px; }
                        iframe { height: 600px; border: none; }
                        .dl-btn { background: #3b82f6; color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; text-decoration: none; font-size: 14px; }
                        .dl-btn:hover { background: #2563eb; }
                    </style>
                </head>
                <body>
                    <h2>Vault.10 Document Viewer</h2>
                    ${pages.map((url, index) => {
                        const isPDF = url.toLowerCase().endsWith('.pdf');
                        return `
                        <div class="item-container">
                            <small style="margin-bottom:10px; color:#666;">Page ${index + 1}</small>
                            ${isPDF ? `<iframe src="${url}"></iframe>` : `<img src="${url}" alt="Page">`}
                            <a href="${url}" download="Vault_Page_${index + 1}" target="_blank" class="dl-btn">DOWNLOAD THIS FILE</a>
                        </div>`;
                    }).join('')}
                    <p style="color: #444; margin-top: 20px;">Vault.10 Secure Cloud</p>
                </body>
                </html>`);
            }
        } catch (e) { alert("Error opening viewer"); }
    }

    async function pushNotes() {
        const s = document.getElementById('f-sub').value, c = document.getElementById('f-chap').value, f = document.getElementById('f-files').files;
        if(!c || f.length === 0) return;
        const b = document.getElementById('up-btn'); b.innerText = "UPLOADING...";
        const urls = [];
        for (let i = 0; i < f.length; i++) {
            const path = `notes/${Date.now()}_${f[i].name}`;
            await supabaseClient.storage.from('note-images').upload(path, f[i]);
            const { data } = supabaseClient.storage.from('note-images').getPublicUrl(path);
            urls.push(data.publicUrl);
        }
        await supabaseClient.from('notes_table').insert([{ subject: s, chapter: c, author: localStorage.getItem("v_user"), pages: urls }]);
        closeModal('up-modal'); sync();
        b.innerText = "UPLOAD TO CLOUD";
    }

    async function deleteNotes(chap) {
        if(confirm("Delete?")) {
            await supabaseClient.from('notes_table').delete().eq('chapter', chap).eq('author', localStorage.getItem("v_user"));
            sync();
        }
    }

    async function sendChat() {
        const input = document.getElementById('chat-input'), user = localStorage.getItem("v_user");
        if(!input.value) return;
        await supabaseClient.from('messages').insert([{ sender_name: user, content: input.value }]);
        input.value = ""; sync();
    }

    function renderHub(m) {
        document.getElementById('hub-list').innerHTML = m.map(x => `<div class="msg-box"><small style="color:var(--accent); font-weight:900;">${x.sender_name}</small><div style="font-size:13px; margin-top:4px;">${x.content}</div></div>`).join('');
    }

    function setSub(s, b) { activeSub=s; document.querySelectorAll('.sub-pill').forEach(x=>x.classList.remove('active')); b.classList.add('active'); render(); }
    function openModal(id) { document.getElementById(id).style.display='flex'; }
    function closeModal(id) { document.getElementById(id).style.display='none'; }
    function toggleHub(s) { document.getElementById('hub-overlay').style.display = s ? 'flex' : 'none'; }
    function saveCloudConfig() {
        localStorage.setItem('gh_config', JSON.stringify({token:document.getElementById('gh-token').value, repo:document.getElementById('gh-repo').value}));
        closeModal('cloud-modal');
    }

    window.onload = () => {
        const user = localStorage.getItem("v_user");
        if (user) {
            document.getElementById('gate').style.display = 'none';
            document.getElementById('u-display').innerText = user; 
            sync();
            supabaseClient.channel('any').on('postgres_changes', { event: '*', schema: 'public', table: 'notes_table' }, sync).subscribe();
        }
    };
</script>
</body>
</html>
