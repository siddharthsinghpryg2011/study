<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault.10 | Glassmorphism Edition</title>
    <style>
        :root {
            --bg: #050505; 
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.12);
            --accent: #3b82f6;
            --text: #fff; 
            --text-dim: #94a3b8;
            --danger: #ef4444;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top right, #1a1a1a, #050505); 
            color: var(--text); 
            margin: 0; min-height: 100vh; overflow-x: hidden;
        }

        .glass-input {
            width: 100%; max-width: 300px; padding: 15px;
            border: 1px solid var(--glass-border); border-radius: 14px;
            background: rgba(255,255,255,0.03); color: white;
            outline: none; transition: 0.3s; text-align: center;
            box-sizing: border-box; display: block; margin: 10px auto;
        }

        select.glass-input { background: #000 !important; cursor: pointer; }

        .btn-blue { 
            background: var(--accent); color: white; border: 0; border-radius: 12px; 
            cursor: pointer; font-weight: 700; transition: 0.2s; 
            padding: 15px; width: 100%; max-width: 300px; display: block; margin: 15px auto;
        }

        header { 
            padding: 15px 25px; border-bottom: 1px solid var(--glass-border); 
            display: flex; justify-content: space-between; align-items: center; 
            background: rgba(5,5,5,0.7); backdrop-filter: blur(25px); 
            position: sticky; top: 0; z-index: 1000; 
        }

        .modal { 
            display: none; position: fixed; inset: 0; 
            background: rgba(0,0,0,0.75); backdrop-filter: blur(12px);
            z-index: 9000; align-items: center; justify-content: center; padding: 20px; 
        }

        .frost-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(30px) saturate(150%);
            border: 1px solid var(--glass-border);
            border-radius: 32px; padding: 40px 20px;
            width: 100%; max-width: 400px; text-align: center;
            position: relative;
        }

        #notif-overlay { 
            position: fixed; right: -100%; top: 0; width: 100%; max-width: 380px; 
            height: 100%; background: rgba(10, 10, 10, 0.6); 
            backdrop-filter: blur(40px); border-left: 1px solid var(--glass-border); 
            z-index: 5000; transition: 0.5s; display: flex; flex-direction: column; align-items: center; padding: 30px 20px;
        }
        #notif-overlay.open { right: 0; }

        .sub-pill {
            padding: 8px 20px; border-radius: 30px; border: 1px solid var(--glass-border); 
            background: var(--glass); color: white; cursor: pointer; white-space: nowrap; transition: 0.3s;
        }
        .sub-pill.active { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }

        .fab { position: fixed; width: 65px; height: 65px; border-radius: 50%; border: 0; color: white; font-size: 24px; cursor: pointer; z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .add-fab { bottom: 30px; left: 30px; background: var(--accent); }
        .notif-fab { bottom: 30px; right: 30px; background: #1a1a1a; border: 1px solid var(--glass-border); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 25px; max-width: 1200px; margin: auto; }
        .card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 24px; padding: 25px; transition: 0.4s; }
        .close-btn { background: none; border: 0; color: white; font-size: 32px; cursor: pointer; }
    </style>
</head>
<body onclick="closeSidebars(event)">

    <div id="gate" style="position:fixed; inset:0; background:var(--bg); z-index:10000; display:flex; flex-direction:column; align-items:center; justify-content:center;">
        <h1 style="font-size: 3rem;">VAULT<span>.10</span></h1>
        <input type="password" id="pass" class="glass-input" placeholder="Access Key">
        <button onclick="login()" class="btn-blue">Authenticate</button>
    </div>

    <header id="main-header" style="display:none;">
        <div style="font-weight:900; font-size:1.5rem;">VAULT<span>.10</span></div>
        <div style="text-align:right;">
            <span id="u-name" style="display:block; font-weight:bold; color:var(--accent);">User</span>
            <span onclick="logout()" style="color:var(--danger); font-size:10px; cursor:pointer;">LOGOUT</span>
        </div>
    </header>

    <main id="app-content" style="display:none;">
        <div style="max-width:900px; margin:20px auto; padding:0 15px;">
            <input type="text" id="search-bar" class="glass-input" style="max-width:100%; border-radius:25px;" placeholder="Search chapters..." oninput="render()">
            <div id="subject-nav" style="display:flex; gap:10px; overflow-x:auto; padding: 10px 0; justify-content: center;">
                <button class="sub-pill active" onclick="setSub('All', this)">All</button>
                <button class="sub-pill" onclick="setSub('Maths', this)">Maths</button>
                <button class="sub-pill" onclick="setSub('Science', this)">Science</button>
                <button class="sub-pill" onclick="setSub('SST', this)">SST</button>
                <button class="sub-pill" onclick="setSub('Hindi', this)">Hindi</button>
                <button class="sub-pill" onclick="setSub('English', this)">English</button>
            </div>
        </div>
        <div id="main-grid" class="grid"></div>
    </main>

    <div id="up-modal" class="modal" onclick="closeModal('up-modal')">
        <div class="frost-card" onclick="event.stopPropagation()">
            <button style="position:absolute; right:20px; top:15px;" class="close-btn" onclick="closeModal('up-modal')">&times;</button>
            <h2>Push Notes</h2>
            <select id="f-sub" class="glass-input">
                <option>Maths</option><option>Science</option><option>SST</option><option>Hindi</option><option>English</option>
            </select>
            <input type="text" id="f-chap" class="glass-input" placeholder="Chapter Name">
            <input type="file" id="f-files" multiple accept="image/*" style="margin:20px 0; font-size:12px;">
            <button onclick="pushNotes()" class="btn-blue">Upload</button>
        </div>
    </div>

    <div id="notif-overlay" onclick="event.stopPropagation()">
        <h3>Activity Hub</h3>
        <input type="text" id="chat-input" class="glass-input" style="background:#000;" placeholder="Broadcast...">
        <button onclick="sendChat()" class="btn-blue" style="padding:10px;">Send</button>
        <div id="notif-list" style="width:100%; overflow-y:auto; flex:1; margin-top:20px;"></div>
    </div>

    <button id="add-btn" class="fab add-fab" style="display:none;" onclick="openModal('up-modal'); event.stopPropagation();">+</button>
    <button id="notif-btn" class="fab notif-fab" style="display:none;" onclick="toggleNotif(true); event.stopPropagation();">🔔</button>

    <script>
        const keys = { "U2lkIzl4WjI=": "Siddharth", "VGVqKjRrTDc=": "Tejeshwar", "QWp5JjFtUDU=": "Ajay" };
        let db = JSON.parse(localStorage.getItem("v_db")) || [];
        let chats = JSON.parse(localStorage.getItem("v_notifs")) || [];
        let activeSub = "All";

        function login() {
            const p = document.getElementById('pass').value.trim();
            if(keys[btoa(p)]) { localStorage.setItem("v_user", keys[btoa(p)]); initApp(); } 
            else { alert("Wrong Key"); }
        }

        function logout() { localStorage.removeItem("v_user"); location.reload(); }

        function initApp() {
            const u = localStorage.getItem("v_user");
            if(u) {
                document.getElementById('gate').style.display = 'none';
                ['main-header', 'app-content', 'add-btn', 'notif-btn'].forEach(id => document.getElementById(id).style.display = 'flex');
                if(document.getElementById('app-content').style.display === 'flex') document.getElementById('app-content').style.display = 'block';
                document.getElementById('u-name').innerText = u;
                render();
            }
        }

        // --- WORKING SUBJECT FILTER ---
        function setSub(subject, btn) {
            activeSub = subject;
            // Remove active class from all pills
            document.querySelectorAll('.sub-pill').forEach(p => p.classList.remove('active'));
            // Add active class to clicked pill
            btn.classList.add('active');
            render();
        }

        function render() {
            const grid = document.getElementById('main-grid');
            const q = document.getElementById('search-bar').value.toLowerCase();
            grid.innerHTML = "";
            
            const filtered = db.filter(item => {
                const matchSub = (activeSub === "All" || item.subject === activeSub);
                const matchSearch = item.chapter.toLowerCase().includes(q);
                return matchSub && matchSearch;
            });

            filtered.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div style="font-size:10px; color:var(--accent); font-weight:900;">${item.subject.toUpperCase()}</div>
                    <div style="font-size:1.2rem; font-weight:bold; margin:10px 0;">${item.chapter}</div>
                    <div style="font-size:9px; color:var(--text-dim)">By: ${item.authors.join(', ')}</div>
                    <button class="btn-blue" style="width:auto; padding:8px 15px; margin:10px 0 0 0; font-size:11px;">VIEW (${item.imgs.length})</button>`;
                grid.appendChild(card);
            });
        }

        function toggleNotif(show) { document.getElementById('notif-overlay').classList.toggle('open', show); if(show) renderChats(); }
        function closeSidebars() { document.getElementById('notif-overlay').classList.remove('open'); }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        async function pushNotes() {
            const sub = document.getElementById('f-sub').value;
            const chap = document.getElementById('f-chap').value.trim();
            const files = document.getElementById('f-files').files;
            if(!chap || files.length === 0) return;
            
            // Image handling and pushing logic
            const user = localStorage.getItem("v_user");
            const newImgs = await Promise.all(Array.from(files).map(f => new Promise(r => {
                const rd = new FileReader(); rd.onload = (e) => r({src: e.target.result, by: user}); rd.readAsDataURL(f);
            })));

            const idx = db.findIndex(i => i.chapter.toLowerCase() === chap.toLowerCase() && i.subject === sub);
            if(idx !== -1) {
                db[idx].imgs.push(...newImgs);
                if(!db[idx].authors.includes(user)) db[idx].authors.push(user);
            } else {
                db.unshift({ id: Date.now(), subject: sub, chapter: chap, authors: [user], imgs: newImgs });
            }
            localStorage.setItem("v_db", JSON.stringify(db));
            closeModal('up-modal'); render();
        }

        window.onload = initApp;
    </script>
</body>
</html>
