<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault.10 | Supabase Cloud</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #050505; --card: #111111; --accent: #3b82f6;
            --text: #ffffff; --text-dim: #94a3b8; --border: #222;
            --danger: #ef4444;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        header { padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(5,5,5,0.8); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 1000; }
        .brand { font-size: 1.2rem; font-weight: 900; cursor: pointer; }
        .brand span { color: var(--accent); }
        .controls { max-width: 900px; margin: 15px auto; padding: 0 15px; }
        #search-bar { width: 100%; padding: 14px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; color: white; outline: none; margin-bottom: 15px; box-sizing: border-box; }
        nav { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .sub-pill { padding: 8px 18px; border-radius: 10px; border: 1px solid var(--border); background: var(--card); color: var(--text-dim); cursor: pointer; white-space: nowrap; font-size: 13px; }
        .sub-pill.active { background: var(--accent); color: white; border-color: var(--accent); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100%, 1fr)); gap: 15px; padding: 15px; max-width: 1200px; margin: auto; }
        @media (min-width: 600px) { .grid { grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); } }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 15px; overflow: hidden; }
        .card-header { padding: 12px 15px; background: #1a1a1a; border-bottom: 1px solid var(--border); font-weight: 800; display: flex; justify-content: space-between; }
        .card-body { padding: 10px 15px; }
        .note-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #222; }
        .actions { display: flex; gap: 5px; }
        .btn-action { padding: 6px 12px; border-radius: 6px; border: 0; cursor: pointer; font-size: 11px; font-weight: bold; color: white; }
        .btn-view { background: var(--accent); }
        .btn-del { background: var(--danger); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 9000; align-items: center; justify-content: center; padding: 10px; flex-direction: column; }
        .modal-ui { background: var(--card); padding: 25px; border-radius: 20px; width: 100%; max-width: 340px; border: 1px solid var(--border); }
        .modal-ui input, .modal-ui select { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid var(--border); color: white; border-radius: 8px; box-sizing: border-box; }
        #hub-overlay { position: fixed; right: -100%; top: 0; width: 100%; max-width: 320px; height: 100%; background: var(--card); border-left: 1px solid var(--border); z-index: 5000; transition: 0.4s; padding: 20px; display: flex; flex-direction: column; box-sizing: border-box; }
        #hub-overlay.open { right: 0; }
        .fab { position: fixed; width: 50px; height: 50px; border-radius: 50%; border: 0; color: white; cursor: pointer; z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .add-fab { bottom: 20px; left: 20px; background: var(--accent); font-size: 24px; }
        .hub-fab { bottom: 85px; right: 20px; background: #222; border: 1px solid var(--border); }
        .logout-fab { bottom: 20px; right: 20px; background: var(--danger); }
        .msg-box { background: #000; padding: 10px; border-radius: 10px; margin-bottom: 10px; border-left: 3px solid var(--accent); position: relative; }
        .msg-del { position: absolute; top: 5px; right: 8px; color: var(--danger); cursor: pointer; }
    </style>
</head>
<body>

<div id="gate" style="position:fixed; inset:0; background:var(--bg); z-index:10000; display:flex; flex-direction:column; align-items:center; justify-content:center;">
    <h1 style="font-size:2.5rem;">VAULT<span>.10</span></h1>
    <input type="password" id="pass" placeholder="Access Key" style="padding:15px; width:260px; border-radius:12px; background:#111; border:1px solid #333; color:white; margin:20px 0; text-align:center;">
    <button onclick="login()" style="width:260px; padding:15px; background:var(--accent); color:white; border:0; border-radius:12px; font-weight:bold;">Enter</button>
</div>

<header>
    <div class="brand" onclick="sync()">VAULT<span>.10</span></div>
    <div><span id="u-name" style="font-weight:bold; font-size:14px;">User</span></div>
</header>

<div class="controls">
    <input type="text" id="search-bar" placeholder="Search chapter..." oninput="render()">
    <nav>
        <button class="sub-pill active" onclick="setSub('All', this)">All</button>
        <button class="sub-pill" onclick="setSub('Maths', this)">Maths</button>
        <button class="sub-pill" onclick="setSub('Science', this)">Science</button>
        <button class="sub-pill" onclick="setSub('SST', this)">SST</button>
        <button class="sub-pill" onclick="setSub('Hindi', this)">Hindi</button>
        <button class="sub-pill" onclick="setSub('English', this)">English</button>
    </nav>
</div>

<div id="main-grid" class="grid"></div>

<div id="up-modal" class="modal">
    <div class="modal-ui">
        <h3>Add Notes</h3>
        <select id="f-sub"><option>Maths</option><option>Science</option><option>SST</option><option>Hindi</option><option>English</option></select>
        <input type="text" id="f-chap" placeholder="Chapter Name">
        <input type="file" id="f-files" multiple accept="image/*">
        <button onclick="pushNotes()" id="up-btn" style="width:100%; padding:12px; background:var(--accent); color:white; border:0; border-radius:8px;">Upload</button>
        <button onclick="closeModal('up-modal')" style="width:100%; background:none; border:0; color:var(--text-dim); margin-top:10px;">Cancel</button>
    </div>
</div>

<div id="pre-modal" class="modal">
    <div style="width:100%; max-width:800px; display:flex; justify-content:space-between; align-items:center;">
        <h3 id="pre-title">Preview</h3>
        <button onclick="closeModal('pre-modal')" style="background:none; border:0; color:white; font-size:30px;">&times;</button>
    </div>
    <div id="gallery" style="overflow-y:auto; flex:1; width:100%; max-width:800px; padding:10px;"></div>
</div>

<div id="hub-overlay">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h3>Activity Hub</h3>
        <button onclick="toggleHub(false)" style="background:none; border:0; color:white; font-size:25px;">&times;</button>
    </div>
    <div style="margin:15px 0;">
        <input type="text" id="chat-input" placeholder="Message..." style="width:100%; padding:12px; background:#000; border:1px solid #333; color:white; border-radius:8px;">
        <button onclick="sendChat()" style="width:100%; padding:10px; background:var(--accent); border:0; border-radius:8px; color:white; margin-top:8px;">Send</button>
    </div>
    <div id="hub-list" style="overflow-y:auto; flex:1;"></div>
</div>

<button class="fab add-fab" onclick="openModal('up-modal')">+</button>
<button class="fab hub-fab" onclick="toggleHub(true)">🔔</button>
<button class="fab logout-fab" onclick="logout()">LOGOUT</button>

<script>
    const SB_URL = "https://eqzkbvktpwzoojhsubum.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVxemtidmt0cHd6b29qaHN1YnVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4ODIxMTAsImV4cCI6MjA4OTQ1ODExMH0.9Oaw3NH3ponUEJL9mKWSgccxA8eyNaie4mfwN1E_8b8";
    
    // Correct Supabase Client initialization
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    const keys = { "U2lkIzl4WjI=": "Siddharth", "VGVqKjRrTDc=": "Tejeshwar", "QWp5JjFtUDU=": "Ajay", "SXNoKjlNMmI=": "Ishmeet" };
    let db = []; let chats = []; let activeSub = "All";

    function login() {
        const p = document.getElementById('pass').value.trim();
        const encoded = btoa(p);
        if(keys[encoded]) { 
            localStorage.setItem("v_user", keys[encoded]); 
            location.reload(); 
        } else {
            alert("Wrong Access Key!");
        }
    }

    function logout() { localStorage.removeItem("v_user"); location.reload(); }

    window.onload = () => {
        const u = localStorage.getItem("v_user");
        if(u) { 
            document.getElementById('gate').style.display = 'none'; 
            document.getElementById('u-name').innerText = u; 
            sync(); 
        }
    };

    async function sync() {
        const { data: nData } = await supabaseClient.from('notes_table').select('*').order('id', { ascending: false });
        if(nData) { db = nData; render(); }
        const { data: cData } = await supabaseClient.from('messages').select('*').order('id', { ascending: false }).limit(30);
        if(cData) { chats = cData; renderHub(); }
    }

    async function pushNotes() {
        const sub = document.getElementById('f-sub').value, chap = document.getElementById('f-chap').value.trim().toLowerCase(), fileInput = document.getElementById('f-files');
        if(!chap || fileInput.files.length === 0) return alert("Fill all details!");
        
        const btn = document.getElementById('up-btn'); btn.innerText = "Uploading..."; btn.disabled = true;

        try {
            const urls = [];
            for (let i = 0; i < fileInput.files.length; i++) {
                const file = fileInput.files[i];
                const path = `notes/${sub}/${Date.now()}_${i}.png`;
                const { error: upErr } = await supabaseClient.storage.from('note-images').upload(path, file);
                if(upErr) throw upErr;
                const { data } = supabaseClient.storage.from('note-images').getPublicUrl(path);
                urls.push(data.publicUrl);
            }
            await supabaseClient.from('notes_table').insert([{ subject: sub, chapter: chap, author: localStorage.getItem("v_user"), pages: urls }]);
            alert("Success!"); closeModal('up-modal'); sync();
        } catch(e) { alert("Upload Failed: " + e.message); }
        btn.innerText = "Upload"; btn.disabled = false;
    }

    function render() {
        const grid = document.getElementById('main-grid'), q = document.getElementById('search-bar').value.toLowerCase();
        grid.innerHTML = "";
        const filtered = db.filter(i => (activeSub === "All" || i.subject === activeSub) && i.chapter.includes(q));
        filtered.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<div class="card-header"><span>${item.chapter.toUpperCase()}</span><small>${item.subject}</small></div>
                <div class="card-body"><div class="note-row"><span>By <b>${item.author}</b></span>
                <div class="actions"><button class="btn-action btn-view" onclick="viewPages(${item.id})">View</button>
                ${item.author === localStorage.getItem("v_user") ? `<button class="btn-action btn-del" onclick="deleteNote(${item.id})">Del</button>` : ''}</div></div></div>`;
            grid.appendChild(card);
        });
    }

    function viewPages(id) {
        const note = db.find(n => n.id === id);
        const gal = document.getElementById('gallery');
        document.getElementById('pre-title').innerText = note.chapter.toUpperCase();
        gal.innerHTML = note.pages.map(p => `<img src="${p}" style="width:100%; border-radius:8px; margin-bottom:10px; border:1px solid #333;">`).join('');
        openModal('pre-modal');
    }

    async function deleteNote(id) {
        if(confirm("Delete this?")) { await supabaseClient.from('notes_table').delete().eq('id', id); sync(); }
    }

    async function sendChat() {
        const input = document.getElementById('chat-input'), user = localStorage.getItem("v_user");
        if(!input.value.trim()) return;
        await supabaseClient.from('messages').insert([{ sender_name: user, content: input.value }]);
        input.value = ""; sync();
    }

    async function deleteChat(id) {
        await supabaseClient.from('messages').delete().eq('id', id); sync();
    }

    function renderHub() {
        const me = localStorage.getItem("v_user");
        document.getElementById('hub-list').innerHTML = chats.map(c => `
            <div class="msg-box"><small style="color:var(--accent);">${c.sender_name}</small><div>${c.content}</div>
            ${c.sender_name === me ? `<span class="msg-del" onclick="deleteChat(${c.id})">&times;</span>` : ''}</div>`).join('');
    }

    function setSub(s, b) { activeSub = s; document.querySelectorAll('.sub-pill').forEach(x => x.classList.remove('active')); b.classList.add('active'); render(); }
    function toggleHub(s) { document.getElementById('hub-overlay').classList.toggle('open', s); }
    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
</script>
</body>
</html>
