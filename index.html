<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault.10 | Private Study Cloud</title>
    <style>
        :root {
            --bg: #050505; --card: #111111; --accent: #3b82f6;
            --text: #ffffff; --text-dim: #94a3b8; --border: #222;
            --danger: #ef4444; --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; }

        /* Auth Screens */
        #gate, #exit-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; text-align: center; }
        .lock-box { padding: 15px; width: 280px; border: 1px solid var(--border); border-radius: 12px; background: #000; color: white; margin-bottom: 20px; outline: none; }

        /* Header */
        header { padding: 15px 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(5,5,5,0.8); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 1000; }
        .brand { font-size: 1.4rem; font-weight: 900; letter-spacing: -1px; }
        .brand span { color: var(--accent); }

        /* Controls */
        .controls { max-width: 900px; margin: 20px auto; padding: 0 20px; }
        nav { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: none; }
        .sub-pill { padding: 10px 22px; border-radius: 12px; border: 1px solid var(--border); background: var(--card); color: var(--text-dim); cursor: pointer; transition: var(--transition); white-space: nowrap; }
        .sub-pill.active { background: var(--accent); color: white; border-color: var(--accent); box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); }
        
        #search-bar { width: 100%; padding: 16px; background: var(--card); border: 1px solid var(--border); border-radius: 14px; color: white; font-size: 16px; outline: none; margin-bottom: 20px; box-sizing: border-box; }

        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: auto; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 20px; transition: var(--transition); }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }

        /* Modals */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9000; align-items: center; justify-content: center; backdrop-filter: blur(5px); flex-direction: column; }
        .modal-ui { background: var(--card); padding: 30px; border-radius: 20px; width: 340px; border: 1px solid var(--border); }
        .modal-ui input, .modal-ui select { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid var(--border); color: white; border-radius: 8px; box-sizing: border-box; }

        /* Notification Panel */
        #notif-overlay { position: fixed; right: -400px; top: 0; width: 320px; height: 100%; background: var(--card); border-left: 1px solid var(--border); z-index: 5000; transition: var(--transition); padding: 20px; display: flex; flex-direction: column; }
        #notif-overlay.open { right: 0; }
        .notif-msg { background: #000; padding: 10px; border-radius: 8px; margin-bottom: 10px; border-left: 3px solid var(--accent); position: relative; }

        /* Gallery */
        .gallery-wrap { display: flex; flex-direction: column; gap: 20px; overflow-y: auto; width: 90%; max-width: 800px; padding: 20px; background: var(--card); border-radius: 20px; max-height: 80vh; }
        .preview-img-box { text-align: center; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .preview-img { width: 100%; border-radius: 10px; border: 1px solid var(--border); }

        /* Buttons */
        .btn { padding: 8px 15px; border-radius: 8px; border: 0; cursor: pointer; font-weight: bold; font-size: 11px; text-decoration: none; display: inline-block; }
        .btn-blue { background: var(--accent); color: white; }
        .btn-red { background: var(--danger); color: white; }
        .fab { position: fixed; width: 60px; height: 60px; border-radius: 50%; border: 0; color: white; font-size: 24px; cursor: pointer; z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .add-fab { bottom: 30px; left: 30px; background: var(--accent); }
        .notif-fab { bottom: 30px; right: 30px; background: #222; border: 1px solid var(--border); }
    </style>
</head>
<body>

<div id="gate">
    <div class="brand" style="font-size: 3rem;">VAULT<span>.10</span></div>
    <input type="password" id="pass" class="lock-box" placeholder="Access Key">
    <button onclick="login()" class="btn-blue" style="width:280px; padding:15px; border-radius:12px;">Authenticate</button>
</div>

<header>
    <div class="brand">VAULT<span>.10</span></div>
    <div style="text-align: right;">
        <span id="u-name" style="font-weight:bold; display:block;">User</span>
        <span onclick="logout()" style="color:var(--danger); font-size:11px; cursor:pointer;">Logout</span>
    </div>
</header>

<div class="controls">
    <input type="text" id="search-bar" placeholder="Search chapter..." oninput="render()">
    <nav>
        <button class="sub-pill active" onclick="setSub('All', this)">All</button>
        <button class="sub-pill" onclick="setSub('Maths', this)">Maths</button>
        <button class="sub-pill" onclick="setSub('Science', this)">Science</button>
        <button class="sub-pill" onclick="setSub('SST', this)">SST</button>
        <button class="sub-pill" onclick="setSub('Hindi', this)">Hindi</button>
        <button class="sub-pill" onclick="setSub('English', this)">English</button>
    </nav>
</div>

<div id="main-grid" class="grid"></div>

<div id="up-modal" class="modal">
    <div class="modal-ui">
        <h3 style="margin-top:0;">Upload Notes</h3>
        <select id="f-sub"><option>Maths</option><option>Science</option><option>SST</option><option>Hindi</option><option>English</option></select>
        <input type="text" id="f-chap" placeholder="Chapter Name (Exact name to group)">
        <input type="file" id="f-files" multiple accept="image/*">
        <button onclick="pushNotes()" id="up-btn" class="btn-blue" style="width:100%; padding:12px; margin-top:10px;">Push to Cloud</button>
        <button onclick="closeModal('up-modal')" style="width:100%; background:none; border:0; color:var(--text-dim); margin-top:10px; cursor:pointer;">Cancel</button>
    </div>
</div>

<div id="pre-modal" class="modal">
    <div style="width:90%; max-width:800px; display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <h3 id="pre-title" style="margin:0;">Preview</h3>
        <button onclick="closeModal('pre-modal')" style="background:none; border:0; color:white; font-size:30px; cursor:pointer;">&times;</button>
    </div>
    <div id="gallery" class="gallery-wrap"></div>
</div>

<button class="fab add-fab" onclick="openModal('up-modal')">+</button>

<script>
    // --- GITHUB CONFIG ---
    const P1 = "ghp_your_first_half"; // Split token to hide from bots
    const P2 = "your_second_half";
    const GITHUB_TOKEN = P1 + P2;
    const REPO_OWNER = "YOUR_USERNAME";
    const REPO_NAME = "YOUR_REPO";

    const keys = { "U2lkIzl4WjI=": "Siddharth", "VGVqKjRrTDc=": "Tejeshwar", "QWp5JjFtUDU=": "Ajay" };
    let db = []; 
    let activeSub = "All";

    function login() {
        const p = document.getElementById('pass').value.trim();
        const enc = btoa(p);
        if(keys[enc]) { localStorage.setItem("v_user", keys[enc]); location.reload(); }
        else { alert("Wrong Key!"); }
    }

    function logout() { localStorage.removeItem("v_user"); location.reload(); }

    window.onload = async () => {
        const u = localStorage.getItem("v_user");
        if(u) { 
            document.getElementById('gate').style.display = 'none'; 
            document.getElementById('u-name').innerText = u; 
            await sync();
        }
    };

    async function gh(path, method = "GET", body = null) {
        const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`;
        const headers = { "Authorization": `token ${GITHUB_TOKEN}`, "Accept": "application/vnd.github.v3+json" };
        return fetch(url, { method, headers, body: body ? JSON.stringify(body) : null });
    }

    async function sync() {
        try {
            const res = await gh("data");
            if (res.ok) {
                const files = await res.json();
                db = [];
                for (let f of files) {
                    if (f.name.endsWith('.json')) {
                        const d = await (await fetch(f.download_url)).json();
                        db.push(d);
                    }
                }
                render();
            }
        } catch (e) { console.error(e); }
    }

    async function pushNotes() {
        const sub = document.getElementById('f-sub').value;
        const chap = document.getElementById('f-chap').value.trim();
        const fileInput = document.getElementById('f-files');
        const user = localStorage.getItem("v_user");

        if(!chap || fileInput.files.length === 0) return alert("Missing info!");
        const btn = document.getElementById('up-btn');
        btn.innerText = "Uploading..."; btn.disabled = true;

        const imgs = await Promise.all(Array.from(fileInput.files).map(f => new Promise(r => {
            const rd = new FileReader(); rd.onload = e => r(e.target.result); rd.readAsDataURL(f);
        })));

        const fileName = `data/${sub}_${chap.replace(/\s+/g, '_')}.json`;
        let sha = null;
        let data = { subject: sub, chapter: chap, notes: [] };

        const check = await gh(fileName);
        if (check.ok) {
            const existing = await check.json();
            sha = existing.sha;
            data = JSON.parse(atob(existing.content));
        }

        data.notes.push({ author: user, time: new Date().toLocaleString(), pages: imgs });

        const push = await gh(fileName, "PUT", {
            message: `Upload ${chap} by ${user}`,
            content: btoa(JSON.stringify(data)),
            sha: sha
        });

        if(push.ok) { alert("Success!"); location.reload(); }
        else { alert("Error! Check Console."); btn.disabled = false; }
    }

    function render() {
        const grid = document.getElementById('main-grid');
        const q = document.getElementById('search-bar').value.toLowerCase();
        grid.innerHTML = "";

        db.filter(i => (activeSub === "All" || i.subject === activeSub) && i.chapter.toLowerCase().includes(q))
        .forEach(item => {
            const authors = [...new Set(item.notes.map(n => n.author))].join(", ");
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div style="font-size:10px; color:var(--accent); font-weight:bold;">${item.subject.toUpperCase()}</div>
                <div style="font-size:1.2rem; font-weight:bold; margin: 10px 0;">${item.chapter}</div>
                <div style="font-size:11px; color:var(--text-dim); margin-bottom:15px;">By: ${authors}</div>
                <div style="display:flex; justify-content:space-between; align-items:center; border-top:1px solid #222; padding-top:12px;">
                    <span style="font-size:11px; color:var(--text-dim)">${item.notes.length} Contributions</span>
                    <button class="btn btn-blue" onclick="viewVault('${item.chapter}')">Open Vault</button>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function viewVault(chapName) {
        const item = db.find(d => d.chapter === chapName);
        const gal = document.getElementById('gallery');
        document.getElementById('pre-title').innerText = chapName;
        gal.innerHTML = item.notes.map(n => `
            <div style="color:var(--accent); font-weight:bold; margin-bottom:10px; border-left:3px solid var(--accent); padding-left:10px;">Uploaded by ${n.author} (${n.time})</div>
            ${n.pages.map((p, i) => `
                <div class="preview-img-box">
                    <img src="${p}" class="preview-img">
                    <a href="${p}" download="${chapName}_${n.author}_P${i+1}.png" class="btn btn-blue" style="margin-top:10px;">Download Page ${i+1}</a>
                </div>
            `).join('')}
        `).join('');
        openModal('pre-modal');
    }

    function setSub(s, btn) {
        activeSub = s;
        document.querySelectorAll('.sub-pill').forEach(x => x.classList.remove('active'));
        btn.classList.add('active');
        render();
    }
    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
</script>
</body>
</html>
