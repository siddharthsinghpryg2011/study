<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault.10 | Live Cloud Storage</title>
    <style>
        :root {
            --bg: #050505; --card: #111111; --accent: #3b82f6;
            --text: #ffffff; --text-dim: #94a3b8; --border: #222;
            --danger: #ef4444; --success: #10b981;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; }

        /* Auth & Exit */
        #gate, #exit-screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; }
        .lock-box { padding: 15px; width: 280px; border: 1px solid var(--border); border-radius: 12px; background: #000; color: white; margin-bottom: 20px; outline: none; }

        /* Header */
        header { padding: 15px 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(5,5,5,0.8); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 1000; }
        .brand { font-size: 1.4rem; font-weight: 900; letter-spacing: -1px; }
        .brand span { color: var(--accent); }

        /* Search & Nav */
        .controls { max-width: 900px; margin: 20px auto; padding: 0 20px; }
        nav { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: none; }
        .sub-pill { padding: 10px 22px; border-radius: 12px; border: 1px solid var(--border); background: var(--card); color: var(--text-dim); cursor: pointer; transition: var(--transition); white-space: nowrap; }
        .sub-pill.active { background: var(--accent); color: white; border-color: var(--accent); }
        
        #search-bar { width: 100%; padding: 16px; background: var(--card); border: 1px solid var(--border); border-radius: 14px; color: white; outline: none; margin-bottom: 20px; }

        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: auto; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 20px; transition: var(--transition); }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }

        /* Notification Panel */
        #notif-overlay { position: fixed; right: -400px; top: 0; width: 320px; height: 100%; background: var(--card); border-left: 1px solid var(--border); z-index: 5000; transition: var(--transition); padding: 20px; }
        #notif-overlay.open { right: 0; }
        .notif-msg { background: #000; padding: 10px; border-radius: 8px; margin-bottom: 8px; border-left: 3px solid var(--accent); font-size: 12px; }

        /* Upload Modal */
        #up-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 9000; align-items: center; justify-content: center; }
        .modal-ui { background: var(--card); padding: 30px; border-radius: 20px; width: 340px; border: 1px solid var(--border); }
        .modal-ui input, .modal-ui select { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid var(--border); color: white; border-radius: 8px; box-sizing: border-box; }

        /* Buttons */
        .add-btn { position: fixed; bottom: 30px; left: 30px; width: 60px; height: 60px; background: var(--accent); border-radius: 50%; border: 0; color: white; font-size: 30px; cursor: pointer; }
        .notif-btn { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: #222; border-radius: 50%; border: 0; color: white; font-size: 24px; cursor: pointer; }
    </style>
</head>
<body>

<div id="gate">
    <div class="brand" style="font-size: 3rem;">VAULT<span>.10</span></div>
    <input type="password" id="pass" class="lock-box" placeholder="Security Key">
    <button onclick="login()" style="width:280px; padding:15px; background:var(--accent); color:white; border:0; border-radius:12px; font-weight:bold; cursor:pointer;">Unlock</button>
</div>

<div id="exit-screen" style="display:none;">
    <div class="brand" style="font-size: 3rem;">Thank You.</div>
    <p style="color:var(--text-dim);">Session ended successfully.</p>
</div>

<header>
    <div class="brand">VAULT<span>.10</span></div>
    <div id="u-info" style="text-align:right;">
        <span id="u-name" style="font-weight:bold; display:block;">Guest</span>
        <span onclick="logout()" style="color:var(--danger); font-size:11px; cursor:pointer;">Secure Logout</span>
    </div>
</header>

<div class="controls">
    <input type="text" id="search-bar" placeholder="Find a chapter..." oninput="renderContent()">
    <nav>
        <button class="sub-pill active" onclick="setSub('All', this)">All</button>
        <button class="sub-pill" onclick="setSub('Maths', this)">Maths</button>
        <button class="sub-pill" onclick="setSub('Science', this)">Science</button>
        <button class="sub-pill" onclick="setSub('SST', this)">SST</button>
        <button class="sub-pill" onclick="setSub('Hindi', this)">Hindi</button>
        <button class="sub-pill" onclick="setSub('English', this)">English</button>
    </nav>
</div>

<div id="main-grid" class="grid"></div>

<div id="up-modal">
    <div class="modal-ui">
        <h3 style="margin-top:0;">Upload Notes</h3>
        <select id="field-sub">
            <option>Maths</option><option>Science</option><option>SST</option><option>Hindi</option><option>English</option>
        </select>
        <input type="text" id="field-chap" placeholder="Chapter Name">
        <input type="file" id="field-files" multiple accept="image/*">
        <button onclick="pushToGitHub()" id="up-btn" style="width:100%; padding:12px; background:var(--accent); color:white; border:0; border-radius:8px; font-weight:bold; margin-top:10px;">Push to Cloud</button>
        <button onclick="toggleModal(false)" style="width:100%; background:none; border:0; color:var(--text-dim); margin-top:10px;">Cancel</button>
    </div>
</div>

<div id="notif-overlay">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h3>Activity Log</h3>
        <button onclick="toggleNotif(false)" style="background:none; border:0; color:white; font-size:25px;">×</button>
    </div>
    <div style="margin: 15px 0;">
        <input type="text" id="msg-box" class="lock-box" style="width:100%; font-size:12px;" placeholder="Say something...">
        <button onclick="sendChat()" style="width:100%; padding:8px; background:var(--accent); border:0; border-radius:8px; color:white;">Send</button>
    </div>
    <div id="notif-list"></div>
</div>

<button class="add-btn" onclick="toggleModal(true)">+</button>
<button class="notif-btn" onclick="toggleNotif(true)">🔔</button>

<script>
    // GitHub Configuration
    const GH_TOKEN = "YOUR_GITHUB_TOKEN_HERE"; // Yaha apna token daalein
    const GH_REPO = "YOUR_USERNAME/YOUR_REPO_NAME"; 
    
    const keys = { "U2lkIzl4WjI=": "Siddharth", "VGVqKjRrTDc=": "Tejeshwar", "QWp5JjFtUDU=": "Ajay" };
    let db = JSON.parse(localStorage.getItem("v_db")) || [];
    let notifs = JSON.parse(localStorage.getItem("v_notifs")) || [];
    let activeSub = "All";

    window.onload = () => {
        const u = localStorage.getItem("v_user");
        if(u) unlock(u);
        renderContent();
    };

    function login() {
        const p = document.getElementById('pass').value;
        const enc = btoa(p);
        if(keys[enc]) {
            localStorage.setItem("v_user", keys[enc]);
            unlock(keys[enc]);
        } else { alert("Wrong Key!"); }
    }

    function unlock(n) {
        document.getElementById('gate').style.display = 'none';
        document.getElementById('u-name').innerText = n;
    }

    function logout() {
        localStorage.removeItem("v_user");
        document.getElementById('exit-screen').style.display = 'flex';
        setTimeout(() => location.reload(), 2000);
    }

    function toggleModal(s) { document.getElementById('up-modal').style.display = s ? 'flex' : 'none'; }
    function toggleNotif(s) { document.getElementById('notif-overlay').classList.toggle('open', s); renderNotifs(); }

    function setSub(s, btn) {
        activeSub = s;
        document.querySelectorAll('.sub-pill').forEach(x => x.classList.remove('active'));
        btn.classList.add('active');
        renderContent();
    }

    async function pushToGitHub() {
        const sub = document.getElementById('field-sub').value;
        const chap = document.getElementById('field-chap').value;
        const files = document.getElementById('field-files').files;
        const user = localStorage.getItem("v_user");

        if(!chap || files.length === 0) return alert("Fill everything!");
        
        document.getElementById('up-btn').innerText = "Uploading...";
        
        // Asli GitHub upload logic yaha aayegi (simulated for now)
        // Har file ko Base64 mein convert karke GitHub API fetch call karni hogi.

        const entry = {
            subject: sub,
            chapter: chap,
            author: user,
            imgs: ["https://via.placeholder.com/400x600"], // Yaha uploaded URL aayega
            time: new Date().toLocaleString()
        };

        db.unshift(entry);
        localStorage.setItem("v_db", JSON.stringify(db));
        
        notifs.unshift({ user: user, text: `Uploaded ${chap} in ${sub}`, time: new Date().toLocaleTimeString() });
        localStorage.setItem("v_notifs", JSON.stringify(notifs));

        toggleModal(false);
        renderContent();
        document.getElementById('up-btn').innerText = "Push to Cloud";
        alert("Success! Saved in GitHub Repository.");
    }

    function renderContent() {
        const grid = document.getElementById('main-grid');
        const query = document.getElementById('search-bar').value.toLowerCase();
        grid.innerHTML = "";
        
        const filtered = db.filter(i => (activeSub === "All" || i.subject === activeSub) && i.chapter.toLowerCase().includes(query));

        filtered.forEach((item, idx) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div style="font-size:11px; color:var(--accent); font-weight:bold;">${item.subject.toUpperCase()}</div>
                <div style="font-size:1.2rem; font-weight:bold; margin: 10px 0;">${item.chapter}</div>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span style="font-size:12px; color:var(--text-dim)">By ${item.author}</span>
                    <div style="display:flex; gap:5px;">
                        ${item.author === localStorage.getItem("v_user") ? `<button onclick="del(${idx})" style="background:var(--danger); color:white; border:0; padding:5px 10px; border-radius:5px; font-size:10px;">Del</button>` : ''}
                        <button style="background:var(--accent); color:white; border:0; padding:5px 10px; border-radius:5px; font-size:10px;">View</button>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function sendChat() {
        const val = document.getElementById('msg-box').value;
        if(!val) return;
        notifs.unshift({ user: localStorage.getItem("v_user"), text: val, time: new Date().toLocaleTimeString() });
        localStorage.setItem("v_notifs", JSON.stringify(notifs));
        document.getElementById('msg-box').value = "";
        renderNotifs();
    }

    function renderNotifs() {
        const list = document.getElementById('notif-list');
        list.innerHTML = notifs.map(n => `<div class="notif-msg"><b>${n.user}:</b> ${n.text}<div style="font-size:9px; opacity:0.5;">${n.time}</div></div>`).join('');
    }

    function del(i) { if(confirm("Delete?")) { db.splice(i,1); localStorage.setItem("v_db", JSON.stringify(db)); renderContent(); } }
</script>
</body>
</html>
