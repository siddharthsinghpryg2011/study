<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vault.10 | Private Study Cloud</title>
    <style>
        :root {
            --bg: #050505; --card: #111111; --accent: #3b82f6;
            --text: #ffffff; --text-dim: #94a3b8; --border: #222;
            --danger: #ef4444; --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; }

        #gate { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; }
        .lock-box { padding: 15px; width: 280px; border: 1px solid var(--border); border-radius: 12px; background: #000; color: white; margin-bottom: 20px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 20px; }

        .btn { padding: 8px 15px; border-radius: 8px; border: 0; cursor: pointer; }
        .btn-blue { background: var(--accent); color: white; }
    </style>
</head>
<body>

<div id="gate">
    <h1>VAULT.10</h1>
    <input type="password" id="pass" class="lock-box" placeholder="Access Key">
    <button onclick="login()" class="btn-blue">Login</button>
</div>

<div id="app" style="display:none;">
    <h2 style="padding:20px;">Vault.10</h2>

    <input type="text" id="search-bar" placeholder="Search..." oninput="render()" style="margin:20px; padding:10px; width:90%;">

    <div id="main-grid" class="grid"></div>

    <div style="padding:20px;">
        <select id="f-sub">
            <option>Maths</option>
            <option>Science</option>
            <option>SST</option>
            <option>Hindi</option>
            <option>English</option>
        </select>
        <input type="text" id="f-chap" placeholder="Chapter">
        <input type="file" id="f-files" multiple>
        <button onclick="pushNotes()" class="btn-blue">Upload</button>
    </div>
</div>

<div id="gallery" style="display:none; padding:20px;"></div>

<script>
const keys = {
    "U2lkIzl4WjI=":"Siddharth",
    "VGVqKjRrTDc=":"Tejeshwar",
    "QWp5JjFtUDU=":"Ajay"
};

let db = JSON.parse(localStorage.getItem("v_db")) || [];

function login(){
    const p = document.getElementById('pass').value.trim();
    const enc = btoa(p);
    if(keys[enc]){
        localStorage.setItem("v_user", keys[enc]);
        location.reload();
    } else alert("Wrong Key");
}

window.onload = ()=>{
    const u = localStorage.getItem("v_user");
    if(u){
        document.getElementById('gate').style.display="none";
        document.getElementById('app').style.display="block";
        render();
    }
};

async function pushNotes() {
    const sub = document.getElementById('f-sub').value;
    const chap = document.getElementById('f-chap').value.trim();
    const fileInput = document.getElementById('f-files');
    const user = localStorage.getItem("v_user");

    if(!chap || fileInput.files.length === 0) return alert("Fill all details!");

    const imagePromises = Array.from(fileInput.files).map(file => {
        return new Promise(r => {
            const reader = new FileReader();
            reader.onload = (e) => r(e.target.result);
            reader.readAsDataURL(file);
        });
    });

    const images = await Promise.all(imagePromises);

    let existing = db.find(i => i.chapter === chap && i.subject === sub);

    if (existing) {
        const already = existing.uploads?.find(u => u.author === user);
        if (already) return alert("Already uploaded!");

        existing.uploads.push({
            author:user,
            imgs:images,
            time:Date.now()
        });

    } else {
        db.unshift({
            id:Date.now(),
            subject:sub,
            chapter:chap,
            uploads:[{
                author:user,
                imgs:images,
                time:Date.now()
            }]
        });
    }

    localStorage.setItem("v_db", JSON.stringify(db));
    render();
}

function render(){
    const grid = document.getElementById('main-grid');
    const q = document.getElementById('search-bar').value.toLowerCase();
    grid.innerHTML="";

    db.filter(i=>i.chapter.toLowerCase().includes(q))
    .forEach(item=>{
        const uploads = item.uploads ? item.uploads.length : 1;

        const card = document.createElement('div');
        card.className="card";

        card.innerHTML=`
            <h3>${item.chapter}</h3>
            <p>${item.subject}</p>
            <p>${uploads} uploads</p>
            <button class="btn-blue" onclick="openGallery(${item.id})">View</button>
        `;

        grid.appendChild(card);
    });
}

function openGallery(id){
    const item = db.find(x=>x.id===id);
    const gal = document.getElementById('gallery');

    gal.style.display="block";
    gal.innerHTML = `<h2>${item.chapter}</h2>`;

    if(!item.uploads){
        item.imgs.forEach(img=>{
            gal.innerHTML += `<img src="${img}" style="width:200px;margin:10px;">`;
        });
    } else {
        item.uploads.forEach(u=>{
            gal.innerHTML += `<h3>${u.author}</h3>`;
            u.imgs.forEach(img=>{
                gal.innerHTML += `<img src="${img}" style="width:200px;margin:10px;">`;
            });
        });
    }
}
</script>

</body>
</html>
