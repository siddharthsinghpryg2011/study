<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class 10 | Private Study Vault</title>
    <style>
        :root {
            --bg: #0a0a0a; --card: #141414; --accent: #3b82f6;
            --text: #ffffff; --text-dim: #94a3b8; --border: #262626;
            --success: #10b981; --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; }

        /* Login Overlay */
        #gate { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; }
        .lock-box { padding: 15px; width: 280px; border: 1px solid var(--border); border-radius: 12px; background: var(--card); color: white; text-align: center; margin-bottom: 20px; outline: none; font-size: 16px; }

        /* Header */
        header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(10px); sticky: top; }
        .brand { font-size: 1.2rem; font-weight: 800; letter-spacing: -0.5px; }
        .brand span { color: var(--accent); }
        .logout-link { font-size: 12px; color: var(--text-dim); cursor: pointer; text-decoration: underline; margin-top: 5px; display: block; }

        /* Notification Section */
        #notif-panel { max-width: 800px; margin: 20px auto; padding: 15px; background: #111; border: 1px solid var(--border); border-radius: 12px; }
        .notif-item { font-size: 13px; padding: 10px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; }
        .notif-item:last-child { border: 0; }
        .notif-time { color: var(--text-dim); font-size: 11px; }

        /* Subjects */
        nav { display: flex; gap: 15px; padding: 20px; overflow-x: auto; justify-content: center; }
        .sub-pill { padding: 10px 25px; border-radius: 30px; border: 1px solid var(--border); background: var(--card); color: var(--text-dim); cursor: pointer; transition: var(--transition); font-weight: 600; }
        .sub-pill.active { background: var(--accent); color: white; border-color: var(--accent); box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); }

        /* Content Area */
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .chapter-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .chap-card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 15px; cursor: pointer; transition: var(--transition); position: relative; }
        .chap-card:hover { border-color: var(--accent); transform: translateY(-5px); }
        
        /* Contributor List (Hidden by default) */
        .contributors { margin-top: 15px; display: none; border-top: 1px solid #333; padding-top: 10px; }
        .friend-btn { display: block; padding: 8px; color: var(--accent); text-decoration: none; font-size: 14px; transition: 0.2s; }
        .friend-btn:hover { background: rgba(59, 130, 246, 0.1); border-radius: 5px; }

        /* Floating Add Button */
        .add-fab { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: var(--accent); border-radius: 50%; border: 0; color: white; font-size: 24px; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }

        /* Modal */
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 9000; align-items: center; justify-content: center; }
        .m-content { background: var(--card); padding: 30px; border-radius: 20px; width: 350px; border: 1px solid var(--border); }
        .m-content input, .m-content select { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid var(--border); color: white; border-radius: 8px; }
    </style>
</head>
<body>

<div id="gate">
    <div class="brand" style="margin-bottom:20px; font-size:2rem;">VAULT<span>.10</span></div>
    <input type="password" id="pass" class="lock-box" placeholder="Access Key">
    <button onclick="login()" style="width:280px; padding:12px; background:var(--accent); color:white; border:0; border-radius:12px; font-weight:bold; cursor:pointer;">Authenticate</button>
</div>

<header>
    <div>
        <div class="brand">CLASS<span>.10</span> STUDY HUB</div>
        <div id="u-display" style="font-size:12px; color:var(--text-dim); margin-top:5px;">User: Siddharth</div>
        <span class="logout-link" onclick="logout()">Reset Session</span>
    </div>
    <div style="text-align: right;">
        <span style="color:var(--success); font-size:12px; font-weight:bold;">● SYSTEM ONLINE</span>
    </div>
</header>

<div class="container">
    <div id="notif-panel">
        <strong style="font-size:12px; color:var(--accent); text-transform:uppercase;">Recent Activity</strong>
        <div id="notif-list" style="margin-top:10px;">
            </div>
    </div>

    <nav>
        <button class="sub-pill" onclick="filterSub('Maths', this)">Maths</button>
        <button class="sub-pill" onclick="filterSub('Science', this)">Science</button>
        <button class="sub-pill" onclick="filterSub('SST', this)">SST</button>
        <button class="sub-pill" onclick="filterSub('English', this)">English</button>
    </nav>

    <div id="display-area" class="chapter-list">
        </div>
</div>

<button class="add-fab" onclick="toggleModal(true)">+</button>

<div id="modal">
    <div class="m-content">
        <h3>New Upload</h3>
        <select id="up-sub">
            <option>Maths</option><option>Science</option><option>SST</option><option>English</option>
        </select>
        <input type="text" id="up-chap" placeholder="Chapter Name">
        <input type="file" id="up-file">
        <button onclick="processUpload()" style="width:100%; padding:12px; background:var(--accent); color:white; border:0; border-radius:8px; margin-top:10px; font-weight:bold; cursor:pointer;">Push to Cloud</button>
        <button onclick="toggleModal(false)" style="width:100%; background:none; border:0; color:var(--text-dim); margin-top:10px; cursor:pointer;">Cancel</button>
    </div>
</div>

<script>
    const keys = { "U2lkIzl4WjI=": "Siddharth", "VGVqKjRrTDc=": "Tejeshwar", "QWp5JjFtUDU=": "Ajay" };
    
    // Asli Data: Only these will show up
    let db = [
        { subject: "Science", chapter: "Motion", authors: ["Siddharth", "Tejeshwar"] },
        { subject: "Maths", chapter: "Polynomials", authors: ["Ajay"] },
        { subject: "SST", chapter: "French Revolution", authors: ["Siddharth"] }
    ];

    let notifications = JSON.parse(localStorage.getItem("v_notifs")) || [
        { msg: "System initialized for Class 10th", time: new Date().toLocaleString() }
    ];

    window.onload = () => {
        const s = localStorage.getItem("v_user");
        if (s) unlock(s);
        renderNotifs();
    };

    function login() {
        const p = document.getElementById('pass').value;
        const enc = btoa(p);
        if (keys[enc]) {
            localStorage.setItem("v_user", keys[enc]);
            unlock(keys[enc]);
        } else { alert("ACCESS DENIED"); }
    }

    function unlock(n) {
        document.getElementById('gate').style.display = 'none';
        document.getElementById('u-display').innerText = "Logged in as: " + n;
    }

    function logout() { localStorage.clear(); location.reload(); }

    function filterSub(sub, btn) {
        document.querySelectorAll('.sub-pill').forEach(x => x.classList.remove('active'));
        btn.classList.add('active');
        
        const area = document.getElementById('display-area');
        area.innerHTML = "";
        
        const filtered = db.filter(x => x.subject === sub);
        
        if(filtered.length === 0) {
            area.innerHTML = `<p style="color:var(--text-dim)">No chapters uploaded yet for ${sub}.</p>`;
            return;
        }

        filtered.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'chap-card';
            card.innerHTML = `
                <div style="font-weight:bold">${item.chapter}</div>
                <div style="font-size:11px; color:var(--accent); margin-top:5px;">${item.authors.length} Notes Available</div>
                <div class="contributors" id="cont-box-${index}">
                    ${item.authors.map(a => `<a class="friend-btn" onclick="alert('Viewing ${a} notes')">📄 ${a}'s Notes</a>`).join('')}
                </div>
            `;
            card.onclick = () => {
                const cBox = document.getElementById(`cont-box-${index}`);
                cBox.style.display = cBox.style.display === 'block' ? 'none' : 'block';
            };
            area.appendChild(card);
        });
    }

    function toggleModal(s) { document.getElementById('modal').style.display = s ? 'flex' : 'none'; }

    function processUpload() {
        const sub = document.getElementById('up-sub').value;
        const chap = document.getElementById('up-chap').value;
        const user = localStorage.getItem("v_user");

        if(!chap) return alert("Enter chapter name");

        // Add to database
        let existing = db.find(x => x.chapter.toLowerCase() === chap.toLowerCase() && x.subject === sub);
        if(existing) {
            if(!existing.authors.includes(user)) existing.authors.push(user);
        } else {
            db.push({ subject: sub, chapter: chap, authors: [user] });
        }

        // Add Notification
        const newNotif = {
            msg: `<b>${user}</b> uploaded <b>${chap}</b> (${sub})`,
            time: new Date().toLocaleString()
        };
        notifications.unshift(newNotif);
        localStorage.setItem("v_notifs", JSON.stringify(notifications));

        renderNotifs();
        toggleModal(false);
        alert("Pushed Successfully!");
    }

    function renderNotifs() {
        const list = document.getElementById('notif-list');
        list.innerHTML = notifications.slice(0, 5).map(n => `
            <div class="notif-item">
                <span>${n.msg}</span>
                <span class="notif-time">${n.time}</span>
            </div>
        `).join('');
    }
</script>
</body>
</html>
